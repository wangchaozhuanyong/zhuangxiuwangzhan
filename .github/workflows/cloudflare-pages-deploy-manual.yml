name: Deploy to Cloudflare Pages

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Prelaunch verification"]
    types: [completed]

concurrency:
  group: cloudflare-pages-prod-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore retained hashed assets
        uses: actions/cache/restore@v5
        with:
          path: .deploy-cache/assets
          key: cloudflare-pages-assets-${{ github.run_id }}
          restore-keys: |
            cloudflare-pages-assets-

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: https://flashcast.com.my
          VITE_SITE_EMAIL: info@flashcast.com.my
          VITE_SITE_PHONE_DISPLAY: "+60 11-2885 3888"
          VITE_SITE_PHONE_E164: "+601128853888"
          VITE_SITE_WHATSAPP_NUMBER: "601128853888"
          VITE_SITE_SSM_NUMBER: "202501027419 (1628831-M)"
          VITE_SITE_ADDRESS: "94, Jalan Mega Mendung, Taman United, 58200 Kuala Lumpur, Malaysia"
          VITE_SITE_SHORT_ADDRESS: "94, Jalan Mega Mendung, 58200"
          VITE_APP_VERSION: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: npm run build

      - name: Retain previous hashed assets
        run: npm run deploy:retain-assets -- --cache .deploy-cache/assets --dist dist/assets --max-files 3000

      - name: Verify deployment cache consistency
        run: npm run verify:deploy-cache

      - name: Lint and test
        run: |
          npm run lint
          npm run test
          npm run typecheck
          npm run typecheck:strict-core

      - name: Deploy (Cloudflare Pages)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: npx wrangler pages deploy dist --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" --branch main --commit-hash "$COMMIT_SHA"

      - name: Save retained hashed assets
        uses: actions/cache/save@v5
        with:
          path: .deploy-cache/assets
          key: cloudflare-pages-assets-${{ github.run_id }}
