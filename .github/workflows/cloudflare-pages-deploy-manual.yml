name: Deploy to Cloudflare Pages

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Prelaunch verification"]
    types: [completed]

concurrency:
  group: cloudflare-pages-prod-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: https://flashcast.com.my
          VITE_SITE_EMAIL: info@flashcast.com.my
          VITE_SITE_PHONE_DISPLAY: "+60 11-2885 3888"
          VITE_SITE_PHONE_E164: "+601128853888"
          VITE_SITE_WHATSAPP_NUMBER: "601128853888"
          VITE_SITE_SSM_NUMBER: "202501027419 (1628831-M)"
          VITE_SITE_ADDRESS: "94, Jalan Mega Mendung, Taman United, 58200 Kuala Lumpur, Malaysia"
          VITE_SITE_SHORT_ADDRESS: "94, Jalan Mega Mendung, 58200"
        run: npm run build

      - name: Lint and test
        run: |
          npm run lint
          npm run test
          npm run typecheck

      - name: Deploy (Cloudflare Pages)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          directory: dist
