name: Prelaunch verification

on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify system Chrome
        run: google-chrome --version

      - name: Architecture check
        run: npm run arch:check

      - name: Restore retained hashed assets
        uses: actions/cache/restore@v5
        with:
          path: .deploy-cache/assets
          key: cloudflare-pages-assets-prelaunch-${{ github.run_id }}
          restore-keys: |
            cloudflare-pages-assets-

      - name: Stable release check
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: https://flashcast.com.my
          VITE_SITE_EMAIL: info@flashcast.com.my
          VITE_SITE_PHONE_DISPLAY: "+60 11-2885 3888"
          VITE_SITE_PHONE_E164: "+601128853888"
          VITE_SITE_WHATSAPP_NUMBER: "601128853888"
          VITE_SITE_SSM_NUMBER: "202501027419 (1628831-M)"
          VITE_SITE_ADDRESS: "94, Jalan Mega Mendung, Taman United, 58200 Kuala Lumpur, Malaysia"
          VITE_SITE_SHORT_ADDRESS: "94, Jalan Mega Mendung, 58200"
          VITE_APP_VERSION: ${{ github.sha }}
        run: npm run release:check

      - name: Preview verification
        env:
          PLAYWRIGHT_CHROMIUM_CHANNEL: chrome
        run: npm run verify:preview:server

      - name: E2E tests
        env:
          PLAYWRIGHT_CHROMIUM_CHANNEL: chrome
        run: npm run test:e2e -- --project=chromium
