<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FLASH CAST Mobile Hero Film</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;800&family=Montserrat:wght@600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div
      id="flashcast-mobile-hero-film"
      data-composition-id="flashcast-mobile-hero-film"
      data-start="0"
      data-duration="18"
      data-width="1080"
      data-height="1920"
    >
      <div class="scene scene-1">
        <img class="visual" src="../flashcast-hero-video/assets/hero-living.jpg" alt="" />
        <div class="content bottom">
          <p class="kicker">FLASH CAST SDN. BHD.</p>
          <h1>马来西亚装修与空间改造</h1>
          <p class="caption">现场测量 · 空间规划 · 材料建议 · 施工管理</p>
        </div>
      </div>

      <div class="scene scene-2">
        <img class="visual" src="../flashcast-hero-video/assets/kitchen.jpg" alt="" />
        <div class="content top">
          <p class="kicker">KITCHEN & BUILT-IN</p>
          <h2>清楚收纳，细节完成。</h2>
        </div>
      </div>

      <div class="scene scene-3">
        <img class="visual" src="../flashcast-hero-video/assets/office.jpg" alt="" />
        <div class="content bottom">
          <p class="kicker">COMMERCIAL FIT-OUT</p>
          <h2>商业空间有序施工。</h2>
        </div>
      </div>

      <div class="scene scene-4">
        <img class="visual" src="../flashcast-hero-video/assets/condo-finish.jpg" alt="" />
        <div class="content bottom">
          <p class="kicker">SITE TO HANDOVER</p>
          <h2>从现场到交付，全程跟进。</h2>
        </div>
      </div>

      <style>
        html,
        body {
          width: 100%;
          height: 100%;
          margin: 0;
          background: #11100e;
          overflow: hidden;
        }

        #flashcast-mobile-hero-film {
          position: relative;
          width: 1080px;
          height: 1920px;
          overflow: hidden;
          background: #11100e;
          color: #fff8ee;
          font-family: "Noto Sans SC", sans-serif;
        }

        .scene {
          position: absolute;
          inset: 0;
          opacity: 0;
          overflow: hidden;
          background: #11100e;
        }

        .visual {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
          object-position: center;
          will-change: transform, opacity;
        }

        .scene-1 .visual {
          object-position: center;
        }

        .scene-2 .visual,
        .scene-3 .visual,
        .scene-4 .visual {
          object-position: center;
        }

        .content {
          position: absolute;
          left: 72px;
          right: 72px;
          z-index: 2;
          display: flex;
          flex-direction: column;
          gap: 18px;
          text-shadow: 0 5px 22px rgba(0, 0, 0, 0.46);
        }

        .top {
          top: 190px;
        }

        .bottom {
          bottom: 210px;
        }

        .kicker {
          margin: 0;
          color: #d4ad69;
          font-family: "Montserrat", sans-serif;
          font-size: 28px;
          font-weight: 700;
          letter-spacing: 0.18em;
          text-transform: uppercase;
        }

        h1,
        h2 {
          margin: 0;
          color: #fff8ee;
          font-weight: 800;
          letter-spacing: 0;
          line-height: 1.12;
        }

        h1 {
          max-width: 850px;
          font-size: 86px;
        }

        h2 {
          max-width: 820px;
          font-size: 76px;
        }

        .caption {
          margin: 0;
          max-width: 850px;
          color: rgba(255, 248, 238, 0.9);
          font-size: 36px;
          font-weight: 700;
          line-height: 1.45;
        }
      </style>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        const scenes = [".scene-1", ".scene-2", ".scene-3", ".scene-4"];

        scenes.forEach((scene, index) => {
          const start = index * 4.5;
          tl.to(scene, { opacity: 1, duration: index === 0 ? 0.1 : 0.7, ease: "power1.inOut" }, start);
          tl.fromTo(
            `${scene} .visual`,
            { scale: 1.08, y: index % 2 === 0 ? -18 : 18 },
            { scale: 1, y: 0, duration: 4.8, ease: "none" },
            start
          );
          tl.from(`${scene} .kicker`, { opacity: 0, y: 28, duration: 0.64, ease: "power3.out" }, start + 0.36);
          tl.from(`${scene} h1, ${scene} h2`, { opacity: 0, y: 38, duration: 0.78, ease: "expo.out" }, start + 0.56);
          if (index === 0) {
            tl.from(`${scene} .caption`, { opacity: 0, y: 28, duration: 0.62, ease: "power2.out" }, start + 0.78);
          }
          if (index < scenes.length - 1) {
            tl.to(scene, { opacity: 0, duration: 0.7, ease: "power1.inOut" }, start + 3.82);
          }
        });

        window.__timelines["flashcast-mobile-hero-film"] = tl;
      </script>
    </div>
  </body>
</html>
