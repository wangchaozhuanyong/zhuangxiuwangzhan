<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FLASH CAST Mobile Luxury Hero Film</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Noto+Sans+SC:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div
      id="flashcast-mobile-hero-film"
      data-composition-id="flashcast-mobile-hero-film"
      data-start="0"
      data-duration="21"
      data-width="1080"
      data-height="1920"
    >
      <div class="scene scene-1">
        <img class="visual" src="assets/mobile-living-luxury.png" alt="" data-layout-allow-overflow />
        <div class="shade shade-bottom"></div>
        <div class="content bottom">
          <p class="kicker">FLASH CAST SDN. BHD.</p>
          <h1>马来西亚装修与空间改造</h1>
          <p class="caption">高级住宅 · 商业空间 · 定制柜 · 项目管理</p>
        </div>
      </div>

      <div class="scene scene-2">
        <img class="visual" src="assets/mobile-kitchen-luxury.png" alt="" data-layout-allow-overflow />
        <div class="shade shade-top"></div>
        <div class="content top">
          <p class="kicker">CUSTOM BUILT-IN</p>
          <h2>收纳干净，细节到位。</h2>
        </div>
      </div>

      <div class="scene scene-3">
        <img class="visual" src="assets/mobile-commercial-luxury.png" alt="" data-layout-allow-overflow />
        <div class="shade shade-bottom"></div>
        <div class="content bottom">
          <p class="kicker">COMMERCIAL FIT-OUT</p>
          <h2>商业空间，做得更有秩序。</h2>
        </div>
      </div>

      <div class="scene scene-4">
        <img class="visual" src="assets/mobile-project-control-luxury.png" alt="" data-layout-allow-overflow />
        <div class="shade shade-bottom"></div>
        <div class="content bottom">
          <p class="kicker">SITE TO HANDOVER</p>
          <h2>有审美的设计，有把控的施工。</h2>
          <p class="caption">让装修更清楚，也更安心。</p>
        </div>
      </div>

      <div class="scene scene-5">
        <img class="visual" src="assets/handover-finish-luxury.png" alt="" data-layout-allow-overflow />
        <div class="shade shade-brand"></div>
        <div class="brand-lockup">
          <img src="assets/logo-flashcast.png" alt="" />
          <p class="kicker">FLASH CAST SDN. BHD.</p>
          <h2>Better Finish. Clearer Process.</h2>
        </div>
      </div>

      <style>
        html,
        body {
          width: 100%;
          height: 100%;
          margin: 0;
          overflow: hidden;
          background: #0d0c0a;
        }

        #flashcast-mobile-hero-film {
          position: relative;
          width: 1080px;
          height: 1920px;
          overflow: hidden;
          background: #0d0c0a;
          color: #fff7ea;
          font-family: "Noto Sans SC", sans-serif;
        }

        .scene {
          position: absolute;
          inset: 0;
          opacity: 0;
          overflow: hidden;
          background: #0d0c0a;
        }

        .visual {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
          object-position: center;
          filter: contrast(1.04) saturate(1.04) brightness(0.98);
          will-change: transform, opacity;
        }

        .scene-5 .visual {
          width: 178%;
          left: -42%;
          object-position: center;
        }

        .shade {
          position: absolute;
          inset: 0;
          pointer-events: none;
        }

        .shade-bottom {
          background:
            linear-gradient(180deg, rgba(10, 9, 7, 0.08) 0%, rgba(10, 9, 7, 0.18) 46%, rgba(10, 9, 7, 0.78) 100%),
            linear-gradient(90deg, rgba(10, 9, 7, 0.38), rgba(10, 9, 7, 0.08), rgba(10, 9, 7, 0.22));
        }

        .shade-top {
          background:
            linear-gradient(180deg, rgba(10, 9, 7, 0.76) 0%, rgba(10, 9, 7, 0.22) 34%, rgba(10, 9, 7, 0.18) 100%),
            linear-gradient(90deg, rgba(10, 9, 7, 0.34), rgba(10, 9, 7, 0.08), rgba(10, 9, 7, 0.22));
        }

        .shade-brand {
          background:
            linear-gradient(180deg, rgba(8, 7, 5, 0.08) 0%, rgba(8, 7, 5, 0.36) 42%, rgba(8, 7, 5, 0.84) 100%),
            linear-gradient(90deg, rgba(8, 7, 5, 0.62), rgba(8, 7, 5, 0.14), rgba(8, 7, 5, 0.32));
        }

        .content {
          position: absolute;
          left: 150px;
          right: 150px;
          z-index: 2;
          display: flex;
          flex-direction: column;
          gap: 18px;
          box-sizing: border-box;
          text-shadow: 0 8px 28px rgba(0, 0, 0, 0.58);
        }

        .top {
          top: 190px;
        }

        .bottom {
          bottom: 260px;
        }

        .kicker {
          margin: 0;
          color: #d1ad72;
          font-family: "Montserrat", sans-serif;
          font-size: 23px;
          font-weight: 800;
          letter-spacing: 0.18em;
          line-height: 1.45;
          text-transform: uppercase;
        }

        h1,
        h2 {
          margin: 0;
          max-width: 900px;
          color: #fff7ea;
          font-weight: 800;
          letter-spacing: 0;
          line-height: 1.12;
        }

        h1 {
          font-size: 66px;
        }

        h2 {
          font-size: 64px;
        }

        .caption {
          margin: 0;
          max-width: 880px;
          color: rgba(255, 247, 234, 0.92);
          font-size: 30px;
          font-weight: 700;
          line-height: 1.45;
        }

        .brand-lockup {
          position: absolute;
          left: 150px;
          right: 150px;
          bottom: 240px;
          z-index: 3;
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          gap: 20px;
          text-shadow: 0 8px 28px rgba(0, 0, 0, 0.62);
        }

        .brand-lockup img {
          width: 190px;
          height: auto;
          object-fit: contain;
          filter: drop-shadow(0 16px 32px rgba(0, 0, 0, 0.46)) brightness(1.08);
        }

        .brand-lockup h2 {
          font-family: "Montserrat", sans-serif;
          font-size: 58px;
          line-height: 1.08;
        }
      </style>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        const scenes = [".scene-1", ".scene-2", ".scene-3", ".scene-4", ".scene-5"];
        const sceneDuration = 4.2;
        const fromIfPresent = (selector, vars, position) => {
          if (document.querySelector(selector)) {
            tl.from(selector, vars, position);
          }
        };

        scenes.forEach((scene, index) => {
          const start = index * sceneDuration;
          tl.to(scene, { opacity: 1, duration: index === 0 ? 0.12 : 0.76, ease: "power1.inOut" }, start);
          tl.fromTo(
            `${scene} .visual`,
            { scale: 1.08, y: index % 2 === 0 ? -24 : 24, x: index === 4 ? -18 : 0 },
            { scale: 1.01, y: 0, x: index === 4 ? 18 : 0, duration: 4.85, ease: "none" },
            start
          );
          fromIfPresent(`${scene} .kicker`, { opacity: 0, y: 28, duration: 0.62, ease: "power3.out" }, start + 0.38);
          fromIfPresent(`${scene} h1, ${scene} h2`, { opacity: 0, y: 42, duration: 0.78, ease: "expo.out" }, start + 0.58);
          fromIfPresent(`${scene} .caption`, { opacity: 0, y: 26, duration: 0.6, ease: "power2.out" }, start + 0.84);
          fromIfPresent(`${scene} .brand-lockup img`, { opacity: 0, y: 28, scale: 0.96, duration: 0.7, ease: "back.out(1.2)" }, start + 0.38);
          if (index < scenes.length - 1) {
            tl.to(scene, { opacity: 0, duration: 0.76, ease: "power1.inOut" }, start + 3.48);
          }
        });

        window.__timelines["flashcast-mobile-hero-film"] = tl;
      </script>
    </div>
  </body>
</html>
